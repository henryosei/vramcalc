name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t vramcalc:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name smoke -p 8000:8000 vramcalc:${{ github.sha }}
          for i in $(seq 1 10); do
            if curl -fsS http://localhost:8000/healthz; then exit 0; fi
            sleep 1
          done
          echo "healthcheck never passed"; docker logs smoke; exit 1
